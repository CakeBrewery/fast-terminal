# Fast terminal tmux configuration (installed by setup_fast_terminal.sh;
# edit config/tmux.conf in the fast-terminal repo, not this copy)
# Based on the Dreams of Code tmux setup (github.com/dreamsofcode-io/tmux),
# with the Snazzy / #1b1b1b (Vine Black) theme instead of catppuccin

# True color support so the terminal theme renders correctly inside tmux
set -g default-terminal "tmux-256color"
# Guarded append so re-sourcing this file never accumulates duplicate entries
%if #{==:#{m:*RGB*,#{terminal-overrides}},0}
set -ga terminal-overrides ",*:RGB"
%endif

# Pass modern input through to CLI apps (e.g. Claude Code): extended keys keep
# Shift+Enter distinct from Enter, passthrough lets drag-and-drop file paths in
set -s extended-keys on
%if #{==:#{m:*extkeys*,#{terminal-features}},0}
set -as terminal-features 'xterm*:extkeys'
%endif
set -g allow-passthrough on

set -g mouse on

# C-Space as the prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open new splits in the current pane's directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Plugins (managed by tpm; installed by this script, or with prefix + I)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

# Theme, loaded after the plugins so it always wins. Accent colors are ANSI
# palette names so they resolve through the emulator's Snazzy profile and
# match it exactly; hex appears only for neutral greys and the background.

# Status bar: block-style window list in Snazzy colors
set -g status-style "bg=default,fg=white"
set -g status-left-length 32
set -g status-left "#[fg=#1b1b1b,bg=green,bold] #S "
set -g status-right "#[fg=#1b1b1b,bg=blue] %H:%M "
setw -g window-status-separator " "
setw -g window-status-format "#[fg=#a5a5a9,bg=#3e404e] #I #[fg=#a5a5a9,bg=#34353e] #W "
setw -g window-status-current-format "#[fg=#1b1b1b,bg=magenta,bold] #I #[fg=magenta,bg=#34353e,bold] #W "

# Pane borders
set -g pane-border-style "fg=#34353e"
set -g pane-active-border-style "fg=blue"

# Messages and command prompt
set -g message-style "bg=default,fg=yellow"
set -g message-command-style "bg=default,fg=yellow"

# Copy mode selection
setw -g mode-style "bg=#3e404e,fg=white"
