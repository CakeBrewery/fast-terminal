# Fast terminal configuration (installed by setup_fast_terminal.sh;
# edit config/ghostty.conf in the fast-terminal repo, not this copy)
# Snazzy is bundled with Ghostty; explicit colors below override the theme
theme = Snazzy
# Custom background #1b1b1b (Vine Black)
background = 1b1b1b
font-family = Menlo
font-size = 12
cursor-style = bar
